<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prank Website</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        .container {
            text-align: center;
            color: white;
            z-index: 10;
        }
        h1 {
            font-size: 4em;
            margin: 0 0 30px 0;
            animation: pulse 1s infinite;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .countdown {
            font-size: 6em;
            font-weight: bold;
            margin: 30px 0;
            animation: bounce 0.5s infinite;
            text-shadow: 0 0 30px rgba(255,255,255,0.5);
        }
        .message {
            font-size: 1.5em;
            margin-top: 30px;
            opacity: 0.9;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        @keyframes colorChange {
            0% { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
            25% { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
            50% { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
            75% { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
            100% { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        }
        body.party-mode {
            animation: colorChange 0.3s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Welcome! 🎉</h1>
        <div class="countdown" id="countdown" style="display: none;">3</div>
        <div class="message" id="message">Click to start the game!</div>
    </div>

    <audio id="prankSound" preload="auto" loop>
        <source src="sound.mp3" type="audio/mpeg">
    </audio>

    <script>
        let isPlaying = false;
        let userInteracted = false;

        function activatePrank() {
            if (isPlaying) return;
            isPlaying = true;
            userInteracted = true;

            // Resume audio context (required for some browsers)
            const audio = document.getElementById('prankSound');
            if (audio && audio.play) {
                // Preload by playing and pausing (helps with autoplay policy)
                audio.play().then(() => {
                    audio.pause();
                    audio.currentTime = 0;
                }).catch(() => {
                    // Ignore error, we'll try again
                });
            }

            // Try to enter fullscreen
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen().catch(err => console.log('Fullscreen request failed'));
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            }

            // Show countdown
            const countdownEl = document.getElementById('countdown');
            const messageEl = document.getElementById('message');
            countdownEl.style.display = 'block';
            messageEl.style.display = 'none';

            let count = 3;
            const countdownInterval = setInterval(() => {
                countdownEl.textContent = count;
                count--;
                if (count < 0) {
                    clearInterval(countdownInterval);
                    countdownEl.style.display = 'none';
                    playSound();
                }
            }, 1000);
        }

        function playSound() {
            const audio = document.getElementById('prankSound');
            
            if (!audio) {
                console.error('Audio element not found');
                return;
            }

            // Set volume to maximum
            audio.volume = 1.0;
            audio.muted = false;
            
            // Reset to beginning
            audio.currentTime = 0;
            
            // Attempt to play
            const playPromise = audio.play();
            
            if (playPromise !== undefined) {
                playPromise
                    .then(() => {
                        console.log('Audio playing successfully');
                        // Add party mode visual
                        document.body.classList.add('party-mode');
                    })
                    .catch(error => {
                        console.error('Audio play error:', error.message);
                        // Try one more time with a slight delay
                        setTimeout(() => {
                            audio.play().catch(e => console.error('Retry failed:', e));
                        }, 100);
                    });
            }
        }

        // Only activate on user interaction (required by modern browsers)
        document.addEventListener('click', activatePrank, { once: true });
        document.addEventListener('touchstart', activatePrank, { once: true });
    </script>
</body>
</html>
</html>
